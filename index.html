<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Printing Meetup — Weekly Presentations</title>
    <meta name="description" content="Weekly 3D printing news and discussion topics for our meetup group.">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">

    <!-- Navigation -->
    <nav class="header-nav">
        <a href="index.html" class="logo" id="logo-refresh">3D Printing Meetup</a>
        <div class="nav-right">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path class="sun-path"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">3D Printing<br>Weekly</h1>
            <p class="hero-subtitle">News, tools, and discussion topics curated for our weekly meetup.</p>
            <a href="#current-section" class="scroll-cue" aria-label="Scroll to presentations">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M19 12l-7 7-7-7"/>
                </svg>
            </a>
        </div>
    </section>

    <!-- Current Presentation -->
    <div class="content-section current-section" id="current-section">
        <p class="section-label">This Week</p>
        <div id="current-list" class="archive-list current-list"></div>
    </div>

    <!-- Archive List -->
    <div class="content-section" id="presentations">
        <p class="section-label">Past Presentations</p>
        <div id="archive-list" class="archive-list">
            <!-- Populated by JavaScript -->
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
            <p class="empty-state-text">No presentations yet. Check back soon.</p>
        </div>
    </div>

    <!-- Footer / About the host -->
    <footer class="footer">
        <p class="footer-host">Hosted by <strong>Max Sikorski</strong></p>
        <p class="footer-tagline">3D print farm · R&amp;D &amp; manufacturing · CAD classes</p>
        <nav class="footer-links">
            <a href="https://www.youtube.com/@maxwellsikorski4926" target="_blank" rel="noopener noreferrer">YouTube</a>
            <a href="https://www.meetup.com/3d-printing-club/" target="_blank" rel="noopener noreferrer">Meetup</a>
            <a href="https://github.com/MaxSikorski" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a id="footer-workwith" href="#">Work With Us</a>
        </nav>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
    <script>
        (function () {
            'use strict';

            // Inline fallback data (used when opening via file:// protocol)
            // Keep this in sync with weeks/index.json
            const INLINE_DATA = {
                "weeks": [
                    {
                        "id": "2026-W25",
                        "date": "2026-06-18",
                        "title": "MRRF's Last Ride, Open-Source Volumetric Printing & a 16-Color U1"
                    },
                    {
                        "id": "2026-W24",
                        "date": "2026-06-11",
                        "title": "MRRF Weekend, BigTreeTech's ViViD & Formlabs Goes Industrial"
                    },
                    {
                        "id": "2026-W23",
                        "date": "2026-06-04",
                        "title": "A2L Launch, Creality's IPO & 3D Printer Ban Bills"
                    },
                    {
                        "id": "2026-W22",
                        "date": "2026-05-28",
                        "title": "PHA Filaments, Slicer Drama & Color Mixing"
                    }
                ]
            };

            const archiveList = document.getElementById('archive-list');
            const currentList = document.getElementById('current-list');
            const pastSection = document.getElementById('presentations');
            const emptyState = document.getElementById('empty-state');

            // "Work With Us" → prefilled email (assembled so plain-text scrapers don't grab it)
            (function () {
                const workLink = document.getElementById('footer-workwith');
                if (!workLink) return;
                const email = ['3dmax.ow6p08', 'bumpmail.io'].join('@');
                const subject = '3D Printing Weekly — Work With You (print farm / R&D / CAD)';
                const body = "Hi Max,\n\nI'd like to talk about working together — print farm / R&D / manufacturing / CAD classes.\n\n";
                workLink.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            })();

            function buildCard(week, index, featured) {
                const card = document.createElement('a');
                card.href = `week.html?week=${week.id}`;
                card.className = featured ? 'archive-card current-card' : 'archive-card';
                card.dataset.delay = index * 0.1;

                const dateObj = new Date(week.date + 'T12:00:00');
                const formattedDate = dateObj.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                card.innerHTML = `
                    <div class="archive-card-info">
                        <p class="archive-card-date">${formattedDate}</p>
                        <h3 class="archive-card-title">${week.title}</h3>
                    </div>
                    <svg class="archive-card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                `;
                return card;
            }

            function renderArchive(data) {
                if (!data.weeks || data.weeks.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                // Sort weeks newest first
                const sorted = data.weeks.slice().sort((a, b) => b.date.localeCompare(a.date));

                // Newest week is featured up top as "This Week"
                currentList.appendChild(buildCard(sorted[0], 0, true));

                // Everything else goes under "Past Presentations"
                const past = sorted.slice(1);
                if (past.length === 0) {
                    pastSection.style.display = 'none';
                } else {
                    past.forEach((week, index) => archiveList.appendChild(buildCard(week, index, false)));
                }

                // Trigger scroll reveals for dynamically added cards
                if (typeof gsap !== 'undefined') {
                    const cards = document.querySelectorAll('.archive-card');
                    gsap.set(cards, { opacity: 0, y: 20 });

                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                gsap.to(entry.target, {
                                    opacity: 1,
                                    y: 0,
                                    duration: 0.8,
                                    ease: 'power4.out',
                                    delay: parseFloat(entry.target.dataset.delay) || 0
                                });
                                observer.unobserve(entry.target);
                            }
                        });
                    }, { threshold: 0.1 });

                    cards.forEach(card => observer.observe(card));
                }
            }

            // Try fetch first (works on GitHub Pages / HTTP), fall back to inline data (file://)
            fetch('weeks/index.json')
                .then(res => {
                    if (!res.ok) throw new Error('HTTP error');
                    return res.json();
                })
                .then(data => renderArchive(data))
                .catch(() => {
                    console.log('Using inline data (file:// mode)');
                    renderArchive(INLINE_DATA);
                });
        })();
    </script>
</body>
</html>
